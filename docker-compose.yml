services:
  # ----------------------------------------------------------------------------
  # 1. Application Layer (Next.js Node Server)
  # ----------------------------------------------------------------------------
  web:
    image: ghcr.io/pullprep/pullprep-website:latest
    build: .
    container_name: pullprep-web
    restart: unless-stopped
    ports:
      # Exposes Next.js port 3000 to the host for local validation/access
      - "3000:3000"
    volumes:
      - pullprep_data:/app/data
    environment:
      - BLIZZARD_CLIENT_ID=${BLIZZARD_CLIENT_ID}
      - BLIZZARD_CLIENT_SECRET=${BLIZZARD_CLIENT_SECRET}
    networks:
      - pullprep_network

  # ----------------------------------------------------------------------------
  # 2. Delivery Layer (Cloudflare Zero-Trust Tunnel)
  # ----------------------------------------------------------------------------
  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: pullprep-tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN}
    depends_on:
      - web
    networks:
      - pullprep_network

networks:
  pullprep_network:
    name: pullprep_network
    driver: bridge

volumes:
  pullprep_data:

