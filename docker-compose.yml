services:
  # ----------------------------------------------------------------------------
  # 1. Database Layer (PostgreSQL)
  # ----------------------------------------------------------------------------
  db:
    image: postgres:16-alpine
    container_name: pullprep-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: pullprep
      POSTGRES_PASSWORD: pullprep_secure_pass
      POSTGRES_DB: pullprep
    volumes:
      - pullprep_db_data:/var/lib/postgresql/data
    networks:
      - pullprep_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pullprep -d pullprep"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------------------------
  # 2. Application Layer (Next.js Node Server)
  # ----------------------------------------------------------------------------
  web:
    image: ghcr.io/pullprep/pullprep-website:latest
    build: .
    container_name: pullprep-web
    restart: unless-stopped
    ports:
      # Exposes Next.js port 3000 to the host for local validation/access
      - "3000:3000"
    volumes:
      - pullprep_data:/app/data
    environment:
      - BLIZZARD_CLIENT_ID=${BLIZZARD_CLIENT_ID}
      - BLIZZARD_CLIENT_SECRET=${BLIZZARD_CLIENT_SECRET}
      - DATABASE_URL=postgresql://pullprep:pullprep_secure_pass@db:5432/pullprep
    depends_on:
      db:
        condition: service_healthy
    networks:
      - pullprep_network

  # ----------------------------------------------------------------------------
  # 3. Delivery Layer (Cloudflare Zero-Trust Tunnel)
  # ----------------------------------------------------------------------------
  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: pullprep-tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN}
    depends_on:
      - web
    networks:
      - pullprep_network

networks:
  pullprep_network:
    name: pullprep_network
    driver: bridge

volumes:
  pullprep_data:
  pullprep_db_data:

